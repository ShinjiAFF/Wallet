<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - B Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui; background: #0a0a0a; color: white; }
        .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen p-6">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-4xl font-bold text-yellow-400 mb-8">🔑 ADMIN MASTER PANEL</h1>
        
        <div class="glass border border-gray-700 rounded-3xl p-8 mb-8">
            <h2 class="text-2xl mb-6">Create New Staff Account</h2>
            <input id="email" placeholder="Staff Email" class="w-full p-4 bg-gray-900 rounded-2xl mb-4 border border-gray-600">
            <button onclick="createStaff()" class="bg-green-600 hover:bg-green-500 px-8 py-4 rounded-2xl font-bold">Create Account</button>
        </div>

        <div class="glass border border-gray-700 rounded-3xl p-8">
            <h2 class="text-2xl mb-6">Staff List</h2>
            <div id="staffList"></div>
        </div>
    </div>

    <script>
        function createStaff() {
            const email = document.getElementById('email').value.trim();
            if (!email) return alert("Enter email!");

            let users = JSON.parse(localStorage.getItem('bfinance_users') || '[]');
            users.push({
                email: email,
                balance: 0,
                created: new Date().toISOString()
            });
            localStorage.setItem('bfinance_users', JSON.stringify(users));
            
            alert("✅ Staff account created: " + email);
            renderStaffList();
        }

        function renderStaffList() {
            const users = JSON.parse(localStorage.getItem('bfinance_users') || '[]');
            const container = document.getElementById('staffList');
            container.innerHTML = users.map(u => `
                <div class="bg-gray-900 p-5 rounded-2xl mb-3 flex justify-between">
                    <div>
                        <div class="font-medium">${u.email}</div>
                        <div class="text-sm text-gray-400">Balance: $${u.balance}</div>
                    </div>
                    <button onclick="deleteUser('${u.email}')" class="text-red-500">Delete</button>
                </div>
            `).join('');
        }

        function deleteUser(email) {
            if (confirm("Delete this staff?")) {
                let users = JSON.parse(localStorage.getItem('bfinance_users') || '[]');
                users = users.filter(u => u.email !== email);
                localStorage.setItem('bfinance_users', JSON.stringify(users));
                renderStaffList();
            }
        }

        // Load on start
        renderStaffList();
    </script>
</body>
</html>
