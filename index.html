<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: system-ui; }
        .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div id="login" class="glass border border-gray-700 rounded-3xl p-10 w-full max-w-md">
        <div class="text-center mb-10">
            <span class="text-6xl">B</span>
            <h1 class="text-5xl font-bold text-yellow-400">FINANCE</h1>
        </div>
        <h2 class="text-3xl text-center mb-8">Welcome Back</h2>
        
        <input id="email" placeholder="Email" class="w-full p-5 bg-gray-900 rounded-2xl mb-4 text-lg">
        <input id="pass" type="password" placeholder="Password" class="w-full p-5 bg-gray-900 rounded-2xl mb-8 text-lg">
        
        <button onclick="login()" class="w-full bg-yellow-400 text-black p-5 rounded-2xl text-xl font-bold">Sign In</button>
        <p class="text-center text-xs text-gray-500 mt-6">Only Admin-created accounts work</p>
    </div>

    <div id="main" class="hidden glass border border-gray-700 rounded-3xl p-10 w-full max-w-md">
        <h1 class="text-3xl">Welcome</h1>
        <div id="balance" class="text-6xl text-yellow-400 mt-8 mb-12 font-mono">$0</div>
        <button onclick="logout()" class="w-full bg-red-600 p-4 rounded-2xl">Logout</button>
    </div>

    <script>
        function login() {
            const email = document.getElementById('email').value.trim();
            if (!email) return alert("Enter email");

            let users = JSON.parse(localStorage.getItem('bfinance_users') || '[]');
            const user = users.find(u => u.email.toLowerCase() === email.toLowerCase());

            if (user) {
                document.getElementById('login').classList.add('hidden');
                document.getElementById('main').classList.remove('hidden');
                document.getElementById('balance').innerHTML = `Balance: $${user.balance || 0}`;
            } else {
                alert("Account not found.\n\nGo to admin.html and create this email first.");
            }
        }

        function logout() {
            location.reload();
        }
    </script>
</body>
</html>
